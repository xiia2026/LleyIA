<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bitácora">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <title>Bitácora</title>
  <style>
    :root {
      --bg:       #0d0d0b;
      --surface:  #181815;
      --surface2: #222220;
      --border:   #2c2c28;
      --accent:   #f59e0b;
      --accent2:  #d97706;
      --adim:     rgba(245,158,11,.13);
      --text:     #f0ede6;
      --muted:    #7a786e;
      --danger:   #ef4444;
      --mono:     'IBM Plex Mono', monospace;
      --serif:    'Lora', Georgia, serif;
      --st:       env(safe-area-inset-top,    0px);
      --sb:       env(safe-area-inset-bottom, 0px);
      --sl:       env(safe-area-inset-left,   0px);
      --sr:       env(safe-area-inset-right,  0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    .hdr {
      padding: calc(var(--st) + 14px) 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .hdr-left {}
    .hdr-sub { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .hdr-brand { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: -.02em; line-height: 1; }
    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      transition: background .12s;
      flex-shrink: 0;
    }
    .btn-icon:active { background: var(--surface2); }

    /* ── FILTER CHIPS ── */
    .filters {
      display: flex; gap: 7px;
      padding: 10px 16px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 10.5px;
      font-family: var(--mono);
      letter-spacing: .04em;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
      user-select: none;
    }
    .chip.on { background: var(--adim); border-color: var(--accent); color: var(--accent); }

    /* ── ENTRY LIST ── */
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px calc(84px + var(--sb));
      -webkit-overflow-scrolling: touch;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0;
      padding: 13px 15px;
      margin-bottom: 9px;
      cursor: pointer;
      transition: background .12s, transform .08s;
      user-select: none;
    }
    .card:active { background: var(--surface2); transform: scale(.99); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .card-cat { font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
    .card-date { font-size: 9.5px; color: var(--muted); }
    .card-title { font-family: var(--serif); font-size: 17px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; color: var(--text); }
    .card-preview {
      font-size: 12px; color: var(--muted); line-height: 1.5;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .card-foot { display: flex; gap: 5px; margin-top: 9px; align-items: center; flex-wrap: wrap; }
    .tag-pill { font-size: 9.5px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .photo-badge { font-size: 10px; color: var(--muted); margin-left: auto; display: flex; align-items: center; gap: 3px; }

    /* ── EMPTY STATE ── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 55%; gap: 14px; }
    .empty-ico { font-size: 52px; opacity: .3; }
    .empty-txt { font-size: 12.5px; color: var(--muted); text-align: center; line-height: 1.6; max-width: 210px; }

    /* ── BOTTOM NAV ── */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      padding: 10px 32px calc(var(--sb) + 10px);
      background: rgba(13,13,11,.93);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--muted); padding: 4px 20px; }
    .nav-item.on { color: var(--accent); }
    .nav-ico { font-size: 22px; }
    .nav-lbl { font-size: 8.5px; letter-spacing: .09em; text-transform: uppercase; }
    .nav-fab {
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--accent); color: #0d0d0b;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 300; line-height: 1;
      box-shadow: 0 4px 24px rgba(245,158,11,.45);
      cursor: pointer; margin-top: -22px;
      transition: transform .12s, box-shadow .12s;
      user-select: none;
    }
    .nav-fab:active { transform: scale(.93); box-shadow: 0 2px 12px rgba(245,158,11,.3); }

    /* ── OVERLAY / PANEL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .panel {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px;
      max-height: 94vh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      display: flex; flex-direction: column;
      transition: transform .3s cubic-bezier(.32,.72,0,1);
    }
    .panel.open { transform: translateX(-50%) translateY(0); }
    .panel-drag { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; flex-shrink: 0; }
    .panel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-ttl { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
    .panel-body {
      flex: 1; overflow-y: auto; padding: 20px;
      padding-bottom: calc(var(--sb) + 20px);
      -webkit-overflow-scrolling: touch;
    }

    /* ── FORM ── */
    .field { margin-bottom: 20px; }
    .lbl { display: block; font-size: 9.5px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .inp {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; color: var(--text);
      font-family: var(--serif); font-size: 16px;
      outline: none; transition: border-color .15s;
      -webkit-appearance: none; appearance: none;
    }
    .inp:focus { border-color: var(--accent); }
    textarea.inp { resize: none; min-height: 110px; line-height: 1.65; }

    /* category grid */
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .cat-btn {
      padding: 10px 6px; border-radius: 9px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--muted); font-size: 10.5px; font-family: var(--mono);
      text-align: center; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: all .12s; user-select: none;
    }
    .cat-emo { font-size: 22px; }
    .cat-btn.on { background: var(--adim); border-color: var(--accent); color: var(--accent); }

    /* tags */
    .tags-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; min-height: 44px; align-items: center; cursor: text;
      transition: border-color .15s;
    }
    .tags-row:focus-within { border-color: var(--accent); }
    .tag-in {
      display: flex; align-items: center; gap: 4px;
      background: var(--adim); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 4px; padding: 2px 7px; font-size: 11px;
    }
    .tag-x { cursor: pointer; font-size: 14px; line-height: 1; opacity: .7; }
    .tag-txt-inp {
      border: none; background: transparent; color: var(--text);
      font-family: var(--mono); font-size: 12px; outline: none;
      flex: 1; min-width: 80px;
    }
    .tag-add-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
    }

    /* photos */
    .photos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .photo-wrap { position: relative; }
    .photo-thumb { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); display: block; }
    .photo-del {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,.75); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
    }
    .photo-add {
      aspect-ratio: 1; border-radius: 8px;
      background: var(--bg); border: 2px dashed var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; color: var(--muted); font-size: 11px;
      transition: border-color .12s; user-select: none;
    }
    .photo-add:active { border-color: var(--accent); }
    .photo-add-ico { font-size: 24px; }

    /* buttons */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: opacity .12s, transform .08s;
    }
    .btn:active { opacity: .83; transform: scale(.99); }
    .btn-primary { background: var(--accent); color: #0d0d0b; }
    .btn-ghost { background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,.4); margin-top: 10px; }
    .spacer { height: 10px; }
    .hr { height: 1px; background: var(--border); margin: 18px 0; }

    /* ── VIEW ENTRY ── */
    .ve-cat { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 3px; }
    .ve-ttl { font-family: var(--serif); font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 5px; }
    .ve-date { font-size: 10.5px; color: var(--muted); margin-bottom: 18px; }
    .ve-txt { font-family: var(--serif); font-size: 17px; line-height: 1.75; color: var(--text); white-space: pre-wrap; margin-bottom: 20px; }
    .ve-photos { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 18px; }
    .ve-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 10px; cursor: pointer; display: block; }
    .ve-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.96);
      z-index: 500; display: none; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: calc(var(--st) + 64px); left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 16px; font-size: 11.5px; z-index: 600;
      opacity: 0; transition: opacity .2s, transform .2s;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SEARCH BAR ── */
    .search-bar {
      display: none; padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-bar.open { display: flex; gap: 8px; align-items: center; }
    .search-inp {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text);
      font-family: var(--mono); font-size: 13px; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .search-inp:focus { border-color: var(--accent); }
    .search-clear { font-size: 13px; color: var(--muted); cursor: pointer; padding: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-sub">Cemenquin S.A. de C.V.</div>
      <div class="hdr-brand">BITÁCORA</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" id="btn-search-toggle" title="Buscar">🔍</button>
      <button class="btn-icon" id="btn-export" title="Exportar PDF">📄</button>
    </div>
  </header>

  <!-- Search bar -->
  <div class="search-bar" id="search-bar">
    <input class="search-inp" id="search-inp" type="search" placeholder="Buscar entradas..." autocomplete="off" autocorrect="off">
    <span class="search-clear" id="search-clear">✕</span>
  </div>

  <!-- Filter chips -->
  <div class="filters" id="filters">
    <div class="chip on" data-f="all">Todos</div>
    <div class="chip" data-f="Entrega">📦 Entrega</div>
    <div class="chip" data-f="Ruta">🚛 Ruta</div>
    <div class="chip" data-f="Incidente">⚠️ Incidente</div>
    <div class="chip" data-f="Mantenimiento">🔧 Mant.</div>
    <div class="chip" data-f="General">📋 General</div>
  </div>

  <!-- Entry list -->
  <div class="list" id="list"></div>

  <!-- Bottom nav -->
  <nav class="nav">
    <div class="nav-item on" id="nav-home">
      <span class="nav-ico">📖</span>
      <span class="nav-lbl">Registros</span>
    </div>
    <div class="nav-fab" id="btn-new">+</div>
    <div class="nav-item" id="nav-stats">
      <span class="nav-ico">📊</span>
      <span class="nav-lbl">Resumen</span>
    </div>
  </nav>
</div>

<!-- ─── NEW / EDIT PANEL ─── -->
<div class="overlay" id="new-overlay"></div>
<div class="panel" id="new-panel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <div class="panel-ttl" id="new-ttl">Nueva Entrada</div>
    <button class="btn-icon" id="btn-close-new">✕</button>
  </div>
  <div class="panel-body">

    <div class="field">
      <label class="lbl">Título</label>
      <input class="inp" id="f-title" type="text" placeholder="Resumen breve...">
    </div>

    <div class="field">
      <label class="lbl">Categoría</label>
      <div class="cat-grid">
        <button class="cat-btn on" data-c="Entrega"><span class="cat-emo">📦</span>Entrega</button>
        <button class="cat-btn"    data-c="Ruta"><span class="cat-emo">🚛</span>Ruta</button>
        <button class="cat-btn"    data-c="Incidente"><span class="cat-emo">⚠️</span>Incidente</button>
        <button class="cat-btn"    data-c="Mantenimiento"><span class="cat-emo">🔧</span>Mantto.</button>
        <button class="cat-btn"    data-c="General"><span class="cat-emo">📋</span>General</button>
        <button class="cat-btn"    data-c="Otro"><span class="cat-emo">➕</span>Otro</button>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Anotación</label>
      <textarea class="inp" id="f-text" placeholder="Detalles de la entrada..."></textarea>
    </div>

    <div class="field">
      <label class="lbl">Etiquetas <span style="font-size:9px;color:var(--muted);letter-spacing:0">(Enter o coma)</span></label>
      <div class="tags-row" id="tags-row">
        <input class="tag-txt-inp" id="tag-inp" type="text" placeholder="Agregar etiqueta...">
        <button class="tag-add-btn" id="tag-add">+ Add</button>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Fotos</label>
      <div class="photos-grid" id="photos-grid"></div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
    </div>

    <div class="hr"></div>
    <button class="btn btn-primary" id="btn-save">Guardar Entrada</button>
    <button class="btn btn-ghost" id="btn-del" style="display:none">Eliminar Entrada</button>
    <div class="spacer"></div>

  </div>
</div>

<!-- ─── VIEW PANEL ─── -->
<div class="overlay" id="view-overlay"></div>
<div class="panel" id="view-panel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <div class="panel-ttl">Entrada</div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" id="btn-edit">✏️</button>
      <button class="btn-icon" id="btn-close-view">✕</button>
    </div>
  </div>
  <div class="panel-body" id="view-body"></div>
</div>

<!-- ─── STATS PANEL ─── -->
<div class="overlay" id="stats-overlay"></div>
<div class="panel" id="stats-panel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <div class="panel-ttl">Resumen</div>
    <button class="btn-icon" id="btn-close-stats">✕</button>
  </div>
  <div class="panel-body" id="stats-body"></div>
</div>

<!-- ─── LIGHTBOX ─── -->
<div class="lightbox" id="lightbox"><img id="lb-img" src="" alt="foto"></div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//  IndexedDB
// ═══════════════════════════════════════════════
let db;
const DB_NAME = 'bita-db', DB_VER = 1;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('entries')) {
        const s = d.createObjectStore('entries', { keyPath: 'id' });
        s.createIndex('createdAt', 'createdAt');
        s.createIndex('category', 'category');
      }
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror   = e => rej(e);
  });
}
const tx = (mode) => db.transaction('entries', mode).objectStore('entries');
const dbAll = () => new Promise((res,rej) => {
  const r = tx('readonly').index('createdAt').getAll();
  r.onsuccess = e => res([...e.target.result].reverse());
  r.onerror = rej;
});
const dbGet = (id) => new Promise((res,rej) => {
  const r = tx('readonly').get(id);
  r.onsuccess = e => res(e.target.result);
  r.onerror = rej;
});
const dbPut = (entry) => new Promise((res,rej) => {
  const r = tx('readwrite').put(entry);
  r.onsuccess = res; r.onerror = rej;
});
const dbDel = (id) => new Promise((res,rej) => {
  const r = tx('readwrite').delete(id);
  r.onsuccess = res; r.onerror = rej;
});

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let entries    = [];
let filter     = 'all';
let searchQ    = '';
let curEntry   = null;
let editId     = null;
let fPhotos    = [];
let fTags      = [];
let fCat       = 'Entrega';

// ═══════════════════════════════════════════════
//  Utilities
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, ms=2200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function fmtFull(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})
    + ' · ' + d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}
function fmtShort(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})
    + ' · ' + d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

const EMOJIS = {Entrega:'📦',Ruta:'🚛',Incidente:'⚠️',Mantenimiento:'🔧',General:'📋',Otro:'➕'};
const emo = c => EMOJIS[c] || '📋';

// ═══════════════════════════════════════════════
//  Panel helpers
// ═══════════════════════════════════════════════
function openPanel(oid, pid) {
  const o = $(oid), p = $(pid);
  o.style.display = 'block';
  requestAnimationFrame(() => {
    o.classList.add('open');
    p.classList.add('open');
  });
}
function closePanel(oid, pid) {
  const o = $(oid), p = $(pid);
  o.classList.remove('open');
  p.classList.remove('open');
  setTimeout(() => { o.style.display = ''; }, 320);
}

// ═══════════════════════════════════════════════
//  Render list
// ═══════════════════════════════════════════════
function getVisible() {
  let list = entries;
  if (filter !== 'all') list = list.filter(e => e.category === filter);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(e =>
      (e.title||'').toLowerCase().includes(q) ||
      (e.text||'').toLowerCase().includes(q)  ||
      (e.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  return list;
}

function renderList() {
  const el = $('list');
  const visible = getVisible();
  if (!visible.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-ico">📖</div>
        <div class="empty-txt">
          ${filter === 'all' && !searchQ
            ? 'Sin entradas aún.<br>Toca <strong>+</strong> para crear una.'
            : 'Sin resultados para esta búsqueda.'}
        </div>
      </div>`;
    return;
  }
  el.innerHTML = visible.map(e => `
    <div class="card" data-id="${e.id}">
      <div class="card-top">
        <div class="card-cat">${emo(e.category)} ${e.category}</div>
        <div class="card-date">${fmtShort(e.createdAt)}</div>
      </div>
      <div class="card-title">${esc(e.title||'Sin título')}</div>
      ${e.text ? `<div class="card-preview">${esc(e.text)}</div>` : ''}
      <div class="card-foot">
        ${(e.tags||[]).slice(0,3).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}
        ${e.photos?.length ? `<span class="photo-badge">📷 ${e.photos.length}</span>` : ''}
      </div>
    </div>`).join('');

  el.querySelectorAll('.card').forEach(c =>
    c.addEventListener('click', () => openView(c.dataset.id))
  );
}

async function loadAndRender() {
  entries = await dbAll();
  renderList();
}

// ═══════════════════════════════════════════════
//  Filter chips
// ═══════════════════════════════════════════════
$('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  filter = chip.dataset.f;
  renderList();
});

// ═══════════════════════════════════════════════
//  Search
// ═══════════════════════════════════════════════
$('btn-search-toggle').addEventListener('click', () => {
  const bar = $('search-bar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) $('search-inp').focus();
  else { searchQ = ''; $('search-inp').value = ''; renderList(); }
});
$('search-inp').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderList();
});
$('search-clear').addEventListener('click', () => {
  $('search-inp').value = ''; searchQ = ''; renderList();
  $('search-bar').classList.remove('open');
});

// ═══════════════════════════════════════════════
//  New / Edit form
// ═══════════════════════════════════════════════
function openNew(entry=null) {
  editId    = entry?.id || null;
  fPhotos   = entry ? [...(entry.photos||[])] : [];
  fTags     = entry ? [...(entry.tags||[])]   : [];
  fCat      = entry?.category || 'Entrega';

  $('new-ttl').textContent = editId ? 'Editar Entrada' : 'Nueva Entrada';
  $('f-title').value = entry?.title || '';
  $('f-text').value  = entry?.text  || '';
  $('btn-del').style.display = editId ? 'block' : 'none';

  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.c === fCat);
  });
  renderFormTags();
  renderFormPhotos();
  openPanel('new-overlay','new-panel');
  setTimeout(() => $('f-title').focus(), 400);
}

$('btn-new').addEventListener('click', () => openNew());
$('btn-close-new').addEventListener('click', () => closePanel('new-overlay','new-panel'));
$('new-overlay').addEventListener('click', () => closePanel('new-overlay','new-panel'));

// categories
document.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
  fCat = b.dataset.c;
  document.querySelectorAll('.cat-btn').forEach(x => x.classList.toggle('on', x===b));
}));

// tags
function renderFormTags() {
  const row = $('tags-row'), inp = $('tag-inp'), add = $('tag-add');
  row.innerHTML = '';
  fTags.forEach((t,i) => {
    const s = document.createElement('span');
    s.className = 'tag-in';
    s.innerHTML = `${esc(t)} <span class="tag-x" data-i="${i}">×</span>`;
    row.appendChild(s);
  });
  row.appendChild(inp); row.appendChild(add);
  row.querySelectorAll('.tag-x').forEach(x =>
    x.addEventListener('click', () => { fTags.splice(+x.dataset.i,1); renderFormTags(); })
  );
}

function addTag() {
  const v = $('tag-inp').value.trim().replace(/,$/,'');
  if (v && !fTags.includes(v)) { fTags.push(v); renderFormTags(); }
  $('tag-inp').value = '';
}

$('tag-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(); }
  else if (e.key === 'Backspace' && !e.target.value && fTags.length) {
    fTags.pop(); renderFormTags();
  }
});
$('tag-add').addEventListener('click', addTag);
$('tags-row').addEventListener('click', () => $('tag-inp').focus());

// photos
function renderFormPhotos() {
  const grid = $('photos-grid');
  grid.innerHTML = '';
  fPhotos.forEach((p,i) => {
    const w = document.createElement('div'); w.className = 'photo-wrap';
    w.innerHTML = `<img class="photo-thumb" src="${p}" alt="foto">
      <div class="photo-del" data-i="${i}">×</div>`;
    grid.appendChild(w);
  });
  const add = document.createElement('div'); add.className = 'photo-add';
  add.innerHTML = `<span class="photo-add-ico">📷</span><span>Agregar</span>`;
  add.addEventListener('click', () => $('photo-input').click());
  grid.appendChild(add);
  grid.querySelectorAll('.photo-del').forEach(d =>
    d.addEventListener('click', e => {
      e.stopPropagation();
      fPhotos.splice(+d.dataset.i,1); renderFormPhotos();
    })
  );
}

$('photo-input').addEventListener('change', async e => {
  for (const f of [...e.target.files]) {
    const b64 = await compress(f, 1200, .78);
    fPhotos.push(b64);
  }
  renderFormPhotos();
  e.target.value = '';
});

function compress(file, maxPx, q) {
  return new Promise(res => {
    const rd = new FileReader();
    rd.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        let w=img.width, h=img.height;
        if (w>maxPx||h>maxPx) {
          if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
          else{w=Math.round(w*maxPx/h);h=maxPx;}
        }
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',q));
      };
      img.src = ev.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// save
$('btn-save').addEventListener('click', async () => {
  addTag(); // flush any pending tag text
  const title = $('f-title').value.trim();
  const text  = $('f-text').value.trim();
  if (!title && !text) { toast('⚠️ Agrega un título o anotación'); return; }

  const now = new Date().toISOString();
  const entry = {
    id:        editId || crypto.randomUUID(),
    title:     title || 'Sin título',
    text,
    category:  fCat,
    tags:      fTags,
    photos:    fPhotos,
    createdAt: editId ? (entries.find(e=>e.id===editId)?.createdAt||now) : now,
    updatedAt: now
  };
  await dbPut(entry);
  closePanel('new-overlay','new-panel');
  closePanel('view-overlay','view-panel');
  await loadAndRender();
  toast(editId ? '✓ Entrada actualizada' : '✓ Entrada guardada');
});

// delete
$('btn-del').addEventListener('click', async () => {
  if (!confirm('¿Eliminar esta entrada permanentemente?')) return;
  await dbDel(editId);
  closePanel('new-overlay','new-panel');
  closePanel('view-overlay','view-panel');
  await loadAndRender();
  toast('🗑 Entrada eliminada');
});

// ═══════════════════════════════════════════════
//  View entry
// ═══════════════════════════════════════════════
async function openView(id) {
  curEntry = await dbGet(id);
  if (!curEntry) return;
  const body = $('view-body');
  body.innerHTML = `
    <div class="ve-cat">${emo(curEntry.category)} ${curEntry.category}</div>
    <div class="ve-ttl">${esc(curEntry.title||'Sin título')}</div>
    <div class="ve-date">${fmtFull(curEntry.createdAt)}</div>
    ${curEntry.text ? `<div class="ve-txt">${esc(curEntry.text)}</div>` : ''}
    ${curEntry.photos?.length ? `
      <div class="ve-photos">
        ${curEntry.photos.map((p,i)=>`<img class="ve-photo" src="${p}" data-i="${i}" alt="foto">`).join('')}
      </div>` : ''}
    ${curEntry.tags?.length ? `
      <div class="ve-tags">
        ${curEntry.tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}
      </div>` : ''}
    <div class="hr"></div>
    <button class="btn btn-primary" id="btn-pdf-single">Exportar esta entrada · PDF</button>
    <div class="spacer"></div>`;

  body.querySelectorAll('.ve-photo').forEach(img =>
    img.addEventListener('click', () => openLightbox(img.src))
  );
  $('btn-pdf-single').addEventListener('click', () => exportPDF([curEntry]));
  openPanel('view-overlay','view-panel');
}

$('btn-close-view').addEventListener('click', () => closePanel('view-overlay','view-panel'));
$('view-overlay').addEventListener('click',    () => closePanel('view-overlay','view-panel'));
$('btn-edit').addEventListener('click', () => {
  closePanel('view-overlay','view-panel');

});

$('nav-stats').addEventListener('click', () => {
  const cats = {};
  let totalPhotos = 0;
  entries.forEach(e => {
    cats[e.category] = (cats[e.category]||0)+1;
    totalPhotos += e.photos?.length||0;
  });
  const statsHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px">
      ${[
        ['📝','Total',''+entries.length+' entradas'],
        ['📷','Fotos',''+totalPhotos+' archivos'],
        ...Object.entries(cats).map(([c,n])=>[emo(c),c,n+' entr.'])
      ].map(([e,l,v])=>`
        <div style="background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px">
          <div style="font-size:20px;margin-bottom:4px">${e}</div>
          <div style="font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">${esc(l)}</div>
          <div style="font-size:18px;font-weight:600;color:var(--text);margin-top:2px">${v}</div>
        </div>`).join('')}
    </div>
    <div class="hr"></div>
    <button class="btn btn-primary" id="btn-export-all-stats">Exportar todas las entradas · PDF</button>
    <div class="spacer"></div>`;
  $('stats-body').innerHTML = statsHtml;
  $('btn-export-all-stats').addEventListener('click', () => exportPDF(getVisible()));
  openPanel('stats-overlay','stats-panel');
});
$('btn-close-stats').addEventListener('click', () => closePanel('stats-overlay','stats-panel'));
$('stats-overlay').addEventListener('click',   () => closePanel('stats-overlay','stats-panel'));

// ═══════════════════════════════════════════════
//  PDF Export
// ═══════════════════════════════════════════════
function loadjsPDF() {
  return new Promise((res,rej) => {
    if (window.jspdf) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

$('btn-export').addEventListener('click', () => exportPDF(getVisible()));

async function exportPDF(list) {
  if (!list.length) { toast('Sin entradas para exportar'); return; }
  toast('⏳ Generando PDF...', 4000);
  try { await loadjsPDF(); } catch(e) { toast('⚠️ Sin conexión para cargar jsPDF'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const W   = doc.internal.pageSize.getWidth();
  const H   = doc.internal.pageSize.getHeight();
  const M   = 20;
  const MW  = W - M*2;
  let y     = M;

  const np = (need=10) => { if(y+need>H-M){doc.addPage();y=M;} };

  // ─ Cover page ─
  doc.setFillColor(13,13,11);
  doc.rect(0,0,W,H,'F');
  doc.setFillColor(245,158,11);
  doc.rect(0,H/2-22,6,44,'F');
  doc.setTextColor(245,158,11);
  doc.setFontSize(32); doc.setFont('helvetica','bold');
  doc.text('BITÁCORA', W/2, H/2-4, {align:'center'});
  doc.setTextColor(180,170,155); doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('Cemenquin S.A. de C.V.', W/2, H/2+8, {align:'center'});
  doc.setFontSize(9); doc.setTextColor(100,95,85);
  doc.text(`Exportado: ${new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'})}`, W/2, H/2+20, {align:'center'});
  doc.text(`Entradas: ${list.length}`, W/2, H/2+27, {align:'center'});

  for (const entry of list) {
    doc.addPage(); y = M;

    // accent bar
    doc.setFillColor(245,158,11);
    doc.rect(M, y, 3, 12, 'F');
    // category
    doc.setTextColor(245,158,11); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text(entry.category.toUpperCase(), M+7, y+5.5);
    // date
    doc.setTextColor(120,115,105); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text(fmtFull(entry.createdAt), W-M, y+5.5, {align:'right'});
    y += 16;

    // title
    doc.setTextColor(20,18,14); doc.setFontSize(18); doc.setFont('helvetica','bold');
    const tl = doc.splitTextToSize(entry.title||'Sin título', MW);
    np(8*tl.length);
    doc.text(tl, M, y); y += 8*tl.length+4;

    // text
    if (entry.text) {
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(55,50,42);
      const lines = doc.splitTextToSize(entry.text, MW);
      for (const l of lines) { np(6.5); doc.text(l, M, y); y+=6.5; }
      y+=4;
    }

    // tags
    if (entry.tags?.length) {
      np(10); let x=M;
      for (const t of entry.tags) {
        const tw = doc.getTextWidth(t)+8;
        doc.setFillColor(240,237,230); doc.roundedRect(x,y-4,tw,7,1.5,1.5,'F');
        doc.setTextColor(90,84,72); doc.setFontSize(8);
        doc.text(t, x+4, y+0.5); x+=tw+5;
      }
      y+=12;
    }

    // photos
    if (entry.photos?.length) {
      const pw = (MW-8)/2, ph = pw*0.75;
      let col=0;
      for (const p of entry.photos) {
        if(col===0) np(ph+4);
        const px = M+col*(pw+8);
        try { doc.addImage(p,'JPEG',px,y,pw,ph,'','MEDIUM'); } catch(e){}
        col++;
        if(col>=2){col=0;y+=ph+4;}
      }
      if(col>0) y+=ph+4;
    }
  }

  const fname = list.length===1
    ? `entrada_${list[0].id.slice(0,8)}.pdf`
    : `bitacora_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
  toast('✓ PDF descargado');
}
